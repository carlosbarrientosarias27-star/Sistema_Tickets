# .github/workflows/ci.yml
name: CI Pipeline — Tickets Soporte NLP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio en la máquina virtual
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala la versión específica de Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Cache y descarga de librerías
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov bandit

      # 4. Análisis estático (Linter)
      - name: Run Linter (Ruff)
        run: ruff check .

      # 5. Seguridad (Análisis de vulnerabilidades en código)
      - name: Security audit (Bandit)
        run: bandit -r src/

      # 6. Ejecución de Tests y Cobertura
      - name: Run Tests with Coverage
        run: |
          pytest --cov=src --cov-report=xml

      # 7. (Opcional) Subir reporte de cobertura como artefacto
      - name: Upload coverage reports to Codecov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml